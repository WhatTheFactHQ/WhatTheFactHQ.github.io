<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What The Fact - News Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        :root {
            --bg: #080808;
            --surface: #111111;
            --border: #1C1C1C;
            --muted: #444;
            --text: #F2F2F2;
            --sub: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 50;
        }

        .brand-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            height: 32px;
            border-radius: 8px;
        }

        .brand {
            font-family: 'Syne';
            font-size: 22px;
            font-weight: 800;
        }

        .brand span {
            color: #FF3B3B;
        }

        .tagline {
            font-size: 11px;
            color: var(--sub);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .carousel-container {
            margin-bottom: 50px;
            animation: fadeIn 0.8s ease-out;
        }

        .carousel-container h2 {
            color: var(--text);
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .carousel {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        .carousel-slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            aspect-ratio: 4 / 3;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .slide.active {
            animation: fadeIn 0.5s ease-in-out;
        }

        .carousel-controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .carousel-btn {
            background: rgba(102, 126, 234, 0.9);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .carousel-btn:hover {
            background: rgba(102, 126, 234, 1);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .carousel-btn:active {
            transform: translateY(0);
        }

        .carousel-indicators {
            position: absolute;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .indicator.active {
            background: rgba(102, 126, 234, 1);
            transform: scale(1.3);
            border-color: white;
        }

        .indicator:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: scale(1.2);
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.95rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .carousel-container h2 {
                font-size: 1.4rem;
            }

            .carousel-btn {
                padding: 8px 14px;
                font-size: 0.85rem;
            }

            .carousel-controls {
                bottom: 10px;
                gap: 5px;
            }

            .carousel-indicators {
                bottom: 65px;
            }

            .indicator {
                width: 10px;
                height: 10px;
            }
        }

        @media (max-width: 480px) {
            main {
                padding: 20px 10px;
            }

            .carousel-container h2 {
                font-size: 1.2rem;
                margin-bottom: 15px;
            }

            .carousel-container {
                margin-bottom: 35px;
            }

            .carousel-btn {
                padding: 7px 12px;
                font-size: 0.8rem;
            }

            .carousel-controls {
                gap: 3px;
            }

            .indicator {
                width: 8px;
                height: 8px;
            }

            footer {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand-wrap">
            <img src="logo.png" class="logo" alt="What The Fact Logo">
            <div>
                <div class="brand">What<span>The</span>Fact</div>
                <div class="tagline">Quick. Clear. News.</div>
            </div>
        </div>
    </header>

    <main>
        <section class="carousel-container">
            <h2>Top News</h2>
            <div class="carousel" id="top-news-carousel">
                <div class="carousel-slides">
                    <div class="slide active"><img src="news1.jpg" alt="Top news 1"></div>
                    <div class="slide"><img src="news2.jpg" alt="Top news 2"></div>
                    <div class="slide"><img src="news3.jpg" alt="Top news 3"></div>
                </div>
            </div>
        </section>

        <section class="carousel-container">
            <h2>Tech News</h2>
            <div class="carousel" id="tech-news-carousel">
                <div class="carousel-slides">
                    <div class="slide active"><img src="tech1.jpg" alt="Tech news 1"></div>
                    <div class="slide"><img src="tech2.jpg" alt="Tech news 2"></div>
                    <div class="slide"><img src="tech3.jpg" alt="Tech news 3"></div>
                </div>
            </div>
        </section>

        <section class="carousel-container">
            <h2>Entertainment News</h2>
            <div class="carousel" id="entertainment-news-carousel">
                <div class="carousel-slides">
                    <div class="slide active"><img src="entertainment1.jpg" alt="Entertainment news 1"></div>
                    <div class="slide"><img src="entertainment2.jpg" alt="Entertainment news 2"></div>
                    <div class="slide"><img src="entertainment3.jpg" alt="Entertainment news 3"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 What The Fact HQ</p>
    </footer>
</body>
</html>
