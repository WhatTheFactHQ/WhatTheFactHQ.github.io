<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WhatTheFact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #1C1C1C;
      --muted: #444;
      --text: #F2F2F2;
      --sub: #888;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 50;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      height: 32px;
      border-radius: 8px;
    }

    .brand {
      font-family: 'Syne';
      font-size: 22px;
      font-weight: 800;
    }

    .brand span {
      color: #FF3B3B;
    }

    .tagline {
      font-size: 11px;
      color: var(--sub);
    }

    .live-dot {
      font-size: 11px;
      color: var(--sub);
    }

    /* FEED */
    .feed {
      padding: 16px;
    }

    .card {
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 14px;
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
    }

    .headline {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .hook-text {
      font-size: 13px;
      color: #aaa;
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      flex-direction: column;
      z-index: 100;
    }

    .modal.open {
      display: flex;
    }

    .slide-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .slide-label {
      font-size: 11px;
      opacity: 0.5;
      margin-bottom: 10px;
    }

    .slide-content {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.4;
    }

    .tap-zones {
      position: absolute;
      inset: 0;
      display: flex;
    }

    .tap-zones div {
      flex: 1;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="brand-wrap">
      <img src="logo.png" class="logo">
      <div>
        <div class="brand">What<span>The</span>Fact</div>
        <div class="tagline">Quick. Clear. News.</div>
      </div>
    </div>
    <div class="live-dot">Live</div>
  </div>

  <!-- FEED -->
  <div class="feed" id="feed">Loading...</div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="slide-wrap" id="slideWrap"></div>

    <div class="tap-zones">
      <div onclick="prevSlide()"></div>
      <div onclick="nextSlide()"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = "1egfyMk99niiivs2usEi6oFEHWHFF6XR5QvbTpdlVxdw";
    const URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

    let articles = [];
    let slides = [];
    let current = 0;

    fetch(URL)
      .then(res => res.json())
      .then(data => {
        articles = data;
        render();
      });

    function render() {
      const feed = document.getElementById("feed");

      feed.innerHTML = articles.map((item, i) => `
        <div class="card" onclick="openModal(${i})">
          <img class="card-img" src="${item.Image || ''}">
          <div class="card-body">
            <div class="headline">${item.Title}</div>
            <div class="hook-text">${item.Hook || ''}</div>
          </div>
        </div>
      `).join("");
    }

    function openModal(i) {
      const item = articles[i];

      slides = [
        item.Title,
        item.Hook,
        item["Heres what happened"],
        item["Why it matters"],
        item["What happens next?"]
      ].filter(Boolean);

      current = 0;
      document.getElementById("modal").classList.add("open");
      show();
    }

    function show() {
      document.getElementById("slideWrap").innerHTML =
        `<div class="slide-content">${slides[current]}</div>`;
    }

    function nextSlide() {
      current++;
      if (current >= slides.length) {
        closeModal();
      } else {
        show();
      }
    }

    function prevSlide() {
      if (current > 0) {
        current--;
        show();
      }
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("open");
    }
  </script>

</body>
</html>
