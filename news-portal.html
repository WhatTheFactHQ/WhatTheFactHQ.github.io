<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Portal</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>What The Fact - News Portal</h1>
    </header>
    <main>
        <section class="carousel-container">
            <h2>Top News</h2>
            <div class="carousel" id="top-news-carousel">
                <div class="carousel-slides">
                    <div class="slide active"><img src="news1.jpg" alt="Top news 1"></div>
                    <div class="slide"><img src="news2.jpg" alt="Top news 2"></div>
                    <div class="slide"><img src="news3.jpg" alt="Top news 3"></div>
                </div>
            </div>
        </section>
        <section class="carousel-container">
            <h2>Tech News</h2>
            <div class="carousel" id="tech-news-carousel">
                <div class="carousel-slides">
                    <div class="slide active"><img src="tech1.jpg" alt="Tech news 1"></div>
                    <div class="slide"><img src="tech2.jpg" alt="Tech news 2"></div>
                    <div class="slide"><img src="tech3.jpg" alt="Tech news 3"></div>
                </div>
            </div>
        </section>
        <section class="carousel-container">
            <h2>Entertainment News</h2>
            <div class="carousel" id="entertainment-news-carousel">
                <div class="carousel-slides">
                    <div class="slide active"><img src="entertainment1.jpg" alt="Entertainment news 1"></div>
                    <div class="slide"><img src="entertainment2.jpg" alt="Entertainment news 2"></div>
                    <div class="slide"><img src="entertainment3.jpg" alt="Entertainment news 3"></div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 What The Fact HQ</p>
    </footer>
</body>
</html>
